<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseDE Translator V7c</title>

<style>

html, body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.translator-box{
    width:100%;
    min-height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-sizing:border-box;
}

.language-bar{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    line-height:1.8;
    padding:10px;
}

.language-bar a{
    text-decoration:none;
    color:#d4af37;
    margin:0 4px;
    transition:0.2s;
}

.language-bar a:hover{
    text-decoration:underline;
}

.language-bar a.active{
    color:#2ea043;
    font-weight:bold;
}

.globe{
    margin-right:6px;
    font-size:20px;
}

@media (max-width:600px){

    .translator-box{
        min-height:100px;
    }

    .language-bar{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="translator-box">

<div class="language-bar">

<span class="globe">🌍</span>

<a href="#" class="active">DE ✓</a> |

<a href="#">EN</a> |

<a href="#">NL</a> |

<a href="#">FR</a> |

<a href="#">ES</a>

</div>

</div>

</body>
</html>
