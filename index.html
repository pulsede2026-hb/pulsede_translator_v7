<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseDE Translator V7d</title>

<style>

html, body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.translator-box{
    width:100%;
    min-height:100px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.language-bar{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    line-height:1.8;
}

.language-bar a{
    text-decoration:none;
    margin:0 6px;
    color:#d4af37;
}

.language-bar a:hover{
    text-decoration:underline;
}

.language-bar a.active{
    color:#2ea043;
    font-weight:bold;
}

.globe{
    margin-right:6px;
}

@media (max-width:600px){

    .language-bar{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="translator-box">

<div class="language-bar">

<span class="globe">🌍</span>

<a href="DE_HOME_LINK_EINFÜGEN"
   target="_top"
   class="active">DE ✓</a>

|

<a href="NL_HOME_LINK_EINFÜGEN"
   target="_top">NL</a>

</div>

</div>

</body>
</html>
