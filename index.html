<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseDE Translator V7</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .translator-box {
    width: 100%;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .language-bar {
    background: #000;
    border: 2px solid #d4af37;
    border-radius: 18px;
    padding: 14px 18px;
    color: #d4af37;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    white-space: normal;
    line-height: 1.8;
    max-width: 95%;
  }

  .language-bar a {
    color: #d4af37;
    text-decoration: none;
    margin: 0 6px;
  }

  .language-bar a:hover {
    text-decoration: underline;
  }

  .globe {
    margin-right: 6px;
  }

  @media (max-width: 600px) {
    .translator-box {
      min-height: 200px;
    }

    .language-bar {
      font-size: 16px;
      padding: 12px 14px;
      line-height: 1.9;
    }
  }
</style>
</head>

<body>

<div class="translator-box">
  <div class="language-bar">
    <span class="globe">🌍</span>
    <a href="DEINE-DE-SEITE" target="_top">DE</a> |
    <a href="DEINE-EN-SEITE" target="_top">EN</a> |
    <a href="DEINE-NL-SEITE" target="_top">NL</a> |
    <a href="DEINE-FR-SEITE" target="_top">FR</a> |
    <a href="DEINE-ES-SEITE" target="_top">ES</a>
  </div>
</div>

</body>
</html>
