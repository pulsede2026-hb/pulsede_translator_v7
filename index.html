<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PulseDE Translator Test V5</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    background:#090909;
    border-bottom:2px solid #d6a84f;
    font-size:14px;
    flex-wrap:wrap;
    gap:10px;
}

.leftinfo{
    color:#ddd;
}

.rightinfo{
    color:#ffd76a;
    font-weight:bold;
}

.lang-link{
    cursor:pointer;
    color:#ffd76a;
    text-decoration:none;
}

.lang-link:hover{
    text-decoration:underline;
}

.lang-btn{
    background:#d6a84f;
    color:black;
    border:none;
    padding:10px 20px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.content{
    padding:30px 20px;
}

#text{
    margin-top:25px;
    font-size:24px;
    line-height:1.5;
}

@media(max-width:700px){
    .topbar{
        flex-direction:column;
        text-align:center;
    }

    #text{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="topbar">

<div class="leftinfo">
💻 Strg + / - / 0
&nbsp;&nbsp;&nbsp;
📱 Finger spreizen / zusammenziehen
</div>

<div class="rightinfo" id="languageStatus">
🌍
<span class="lang-link" onclick="setLanguage('de')">DE ✓</span> |
<span class="lang-link" onclick="setLanguage('en')">EN</span> |
<span class="lang-link" onclick="setLanguage('nl')">NL</span> |
<span class="lang-link" onclick="setLanguage('fr')">FR</span> |
<span class="lang-link" onclick="setLanguage('es')">ES</span>
</div>

</div>

<div class="content">

<h2>🧩 PulseDE Translator Test V5</h2>

<button class="lang-btn" onclick="setGerman()">Deutsch</button>
<button class="lang-btn" onclick="setEnglish()">English</button>

<div id="text">
Willkommen bei PulseDE Erlebniswelt
</div>

</div>

<script>

const translations = {
de: "Willkommen bei PulseDE Erlebniswelt",
en: "Welcome to PulseDE Experience World",
nl: "Welkom bij PulseDE Belevingswereld",
fr: "Bienvenue dans l'univers PulseDE",
es: "Bienvenido al mundo de PulseDE"
};

function updateLanguageDisplay(lang){

const langs = ["de","en","nl","fr","es"];
const labels = {
de:"DE",
en:"EN",
nl:"NL",
fr:"FR",
es:"ES"
};

let html = "🌍 ";

langs.forEach((l,index)=>{

html += `<span class="lang-link" onclick="setLanguage('${l}')">${labels[l]}${l===lang?' ✓':''}</span>`;

if(index < langs.length-1){
html += " | ";
}

});

document.getElementById("languageStatus").innerHTML = html;

}

function setLanguage(lang){

localStorage.setItem("language",lang);

document.getElementById("text").innerHTML =
translations[lang];

updateLanguageDisplay(lang);

}

window.onload = function(){

const lang =
localStorage.getItem("language") || "de";

document.getElementById("text").innerHTML =
translations[lang];

updateLanguageDisplay(lang);

}

</script>
</body>
</html>
