<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PulseDE Translator Test V2</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    background:#090909;
    border-bottom:2px solid #d6a84f;
    font-size:14px;
    flex-wrap:wrap;
    gap:10px;
}

.leftinfo{
    color:#ddd;
}

.rightinfo{
    color:#ffd76a;
    font-weight:bold;
}

.lang-btn{
    background:#d6a84f;
    color:black;
    border:none;
    padding:10px 20px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.content{
    padding:30px 20px;
}

#text{
    margin-top:25px;
    font-size:24px;
    line-height:1.5;
}

@media(max-width:700px){

.topbar{
    flex-direction:column;
    text-align:center;
}

#text{
    font-size:20px;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="leftinfo">
💻 Strg + / - / 0
&nbsp;&nbsp;&nbsp;
📱 Finger spreizen / zusammenziehen
</div>

<div class="rightinfo">
🌍 Deutsch | English
</div>

</div>

<div class="content">

<h2>🧩 PulseDE Translator Test</h2>

<button class="lang-btn" onclick="setGerman()">
Deutsch
</button>

<button class="lang-btn" onclick="setEnglish()">
English
</button>

<div id="text">

Willkommen bei PulseDE Erlebniswelt

</div>

</div>

<script>

function setGerman(){

localStorage.setItem("language","de");

document.getElementById("text").innerHTML =
"Willkommen bei PulseDE Erlebniswelt";

}

function setEnglish(){

localStorage.setItem("language","en");

document.getElementById("text").innerHTML =
"Welcome to PulseDE Experience World";

}

window.onload = function(){

const lang = localStorage.getItem("language");

if(lang === "en"){

document.getElementById("text").innerHTML =
"Welcome to PulseDE Experience World";

}else{

document.getElementById("text").innerHTML =
"Willkommen bei PulseDE Erlebniswelt";

}

}

</script>

</body>
</html>
